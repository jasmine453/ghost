  async showLonelyEndingLunge() {
    const titleScreen = document.getElementById('title-screen');
    const seq = document.getElementById('opening-sequence');
    const stack = document.getElementById('opening-stack');
    const blur = document.getElementById('opening-blur');
    const shot = document.getElementById('opening-shot');
    const brand = document.getElementById('title-brand');
    const warning = document.getElementById('title-warning');
    const failScreen = document.getElementById('fail-screen');
    const retryBtn = document.getElementById('fail-retry-btn');
    const boyDial = document.getElementById('boy-dialogue');

    if (!titleScreen || !seq || !stack || !blur || !shot || !brand || !failScreen || !retryBtn) {
      this.showLonelyEndingScreen();
      return;
    }

    Audio.alert();
    Audio.heartbeat(2);
    Effects.shake(700);
    boyDial.style.display = 'none';
    document.getElementById('footstep-indicator').style.display = 'none';

    failScreen.style.display = 'flex';
    failScreen.style.visibility = '';
    failScreen.style.opacity = '0';
    failScreen.style.pointerEvents = 'none';
    failScreen.style.transition = 'opacity 0.9s ease';
    document.getElementById('fail-text').textContent = '呼吸声出卖了你。\n它来了。';
    document.getElementById('fail-text').style.whiteSpace = 'pre-line';
    document.getElementById('fail-sub').textContent = '屏息失败。姐姐锁定了你的位置。';
    retryBtn.onclick = () => {
      retryBtn.onclick = null;
      restartToBeginning();
    };

    brand.classList.remove('title-brand--visible');
    brand.style.display = 'none';
    if (warning) warning.style.opacity = '0';

    titleScreen.style.display = 'flex';
    titleScreen.style.opacity = '1';
    titleScreen.style.transition = '';
    titleScreen.style.pointerEvents = 'none';
    titleScreen.classList.remove('title-phase-brand', 'title-screen--under-pretitle');

    seq.style.display = 'flex';
    seq.setAttribute('aria-hidden', 'false');
    seq.classList.remove('opening--develop', 'opening--shock', 'opening--exit');
    stack.style.opacity = '1';

    blur.style.opacity = '0.82';
    blur.style.filter = 'blur(40px) brightness(0.2) saturate(0.7)';
    blur.style.transform = 'scale(1.08)';
    shot.style.opacity = '1';
    shot.style.filter = 'brightness(1.02) contrast(1.08) saturate(1.02)';
    shot.style.transform = 'scale(1.09) translateY(-1%)';

    await new Promise((resolve) => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          seq.classList.add('opening--shock');
          resolve();
        });
      });
    });
    await new Promise((resolve) => setTimeout(resolve, 450));
    seq.classList.remove('opening--shock');
    await new Promise((resolve) => setTimeout(resolve, 650));

    titleScreen.style.transition = 'opacity 0.9s ease';
    requestAnimationFrame(() => {
      titleScreen.style.opacity = '0';
      failScreen.style.opacity = '1';
    });

    await new Promise((resolve) => setTimeout(resolve, 920));

    titleScreen.style.display = 'none';
    titleScreen.style.pointerEvents = '';
    titleScreen.style.transition = 'opacity 0.55s ease';
    seq.style.display = 'none';
    seq.setAttribute('aria-hidden', 'true');
    failScreen.style.pointerEvents = '';

    blur.style.opacity = '';
    blur.style.filter = '';
    blur.style.transform = '';
    shot.style.opacity = '';
    shot.style.filter = '';
    shot.style.transform = '';
    if (warning) warning.style.opacity = '';
  },

  showLonelyEndingScreen() {
    const failScreen = document.getElementById('fail-screen');
    const retryBtn = document.getElementById('fail-retry-btn');
    failScreen.style.display = 'flex';
    failScreen.style.visibility = '';
    failScreen.style.opacity = '';
    failScreen.style.pointerEvents = '';
    document.getElementById('fail-text').textContent = '呼吸声出卖了你。\n它来了。';
    document.getElementById('fail-text').style.whiteSpace = 'pre-line';
    document.getElementById('fail-sub').textContent = '屏息失败。姐姐锁定了你的位置。';
    retryBtn.onclick = () => {
      retryBtn.onclick = null;
      restartToBeginning();
    };
  },

  finalWarning() {
    Audio.alert();
    Effects.shake(500);

    document.getElementById('footstep-indicator').style.display = 'block';

    const boyDial = document.getElementById('boy-dialogue');
    const boyText = document.getElementById('boy-dialogue-text');
    boyDial.style.display = 'block';
    boyText.style.color = 'rgba(220,60,60,0.95)';
    boyText.style.fontSize = 'clamp(18px,5vw,28px)';
    boyText.textContent = '';

    let text = '';
    const msg = '它闻到你了！！！';
    let i = 0;
    const typeInterval = setInterval(() => {
      if (i < msg.length) {
        text += msg[i++];
        boyText.textContent = text;
        Audio.tone(200 + i * 10, 0.05, 'sawtooth', 0.1);
      } else {
        clearInterval(typeInterval);
        Audio.heartbeat(3);
        setTimeout(() => {
          boyDial.style.display = 'none';
          this.breathingMechanic();
        }, 1500);
      }
    }, 100);
  },

  breathingMechanic() {
    this.cleanupBreath();

    document.getElementById('footstep-indicator').style.display = 'none';
    document.getElementById('vignette').style.background =
      'radial-gradient(ellipse 50% 50% at 50% 50%, transparent 20%, rgba(0,0,0,0.92) 100%)';

    const ui = document.getElementById('breath-ui');
    ui.style.display = 'flex';
    ui.style.opacity = '';
    ui.style.pointerEvents = '';
    ui.style.zIndex = '200';

    let breathLevel = 50;
    const fill = document.getElementById('breath-meter-fill');
    const center = document.getElementById('breath-center');
    const btn = document.getElementById('breath-hold-btn');

    const updateBreath = () => {
      if (fill) fill.style.width = breathLevel + '%';
    };
    updateBreath();

    this._breathHolding = false;
    this.breathInterval = setInterval(() => {
      breathLevel = Math.min(100, breathLevel + 0.8);
      updateBreath();
      if (breathLevel >= 100) {
        this.breathFail();
      }
    }, 100);

    this._breathPtrDown = (e) => {
      if (e) e.preventDefault();
      this._breathHolding = true;
      btn.classList.add('held');
      center.classList.add('stable');
      try { Audio.tone(80, 0.5, 'sine', 0.15); } catch (err) {}
      if (!this.breathHoldInterval) {
        this.breathHoldInterval = setInterval(() => {
          if (this._breathHolding) {
            breathLevel = Math.max(0, breathLevel - 2.5);
            updateBreath();
            if (breathLevel <= 0) {
              this.breathSucceed();
            }
          }
        }, 100);
      }
    };

    this._breathPtrUp = () => {
      this._breathHolding = false;
      btn.classList.remove('held');
      center.classList.remove('stable');
    };

    btn.addEventListener('mousedown', this._breathPtrDown);
    btn.addEventListener('touchstart', this._breathPtrDown, { passive: false });
    btn.addEventListener('mouseup', this._breathPtrUp);
    btn.addEventListener('mouseleave', this._breathPtrUp);
    btn.addEventListener('touchend', this._breathPtrUp);
    btn.addEventListener('touchcancel', this._breathPtrUp);

    this.breathKeyHandler = (e) => {
      if (e.code === 'Space') {
        if (e.repeat) return; // 防止长按空格重复触发
        e.preventDefault();
        if (e.type === 'keydown') this._breathPtrDown(null);
        else this._breathPtrUp();
      }
    };
    document.addEventListener('keydown', this.breathKeyHandler);
    document.addEventListener('keyup', this.breathKeyHandler);
  },

  retryBreathPhase() {
    const tr = document.getElementById('transition');
    if (tr) tr.classList.remove('fade-in');
    const failScreen = document.getElementById('fail-screen');
    failScreen.style.display = 'none';
    failScreen.style.pointerEvents = 'none';
    failScreen.style.visibility = 'hidden';
    this._breathEnded = false;
    this.cleanupBreath();
    const fill = document.getElementById('breath-meter-fill');
    if (fill) fill.style.width = '50%';
    requestAnimationFrame(() => {
      failScreen.style.visibility = '';
      failScreen.style.pointerEvents = '';
      this.breathingMechanic();
    });
  },

  breathFail() {
    if (this._breathEnded) return;
    this._breathEnded = true;
    this.cleanupBreath();
    Effects.shake(800);
    Audio.dread();

    const failScreen = document.getElementById('fail-screen');
    failScreen.style.display = 'flex';
    failScreen.style.visibility = '';
    failScreen.style.opacity = '';
    failScreen.style.pointerEvents = '';
    document.getElementById('fail-text').textContent = '呼吸声出卖了你。\n它来了。';
    document.getElementById('fail-text').style.whiteSpace = 'pre-line';
    document.getElementById('fail-sub').textContent = '屏息失败。姐姐锁定了你的位置。';

    document.getElementById('fail-retry-btn').addEventListener('click', () => {
      this.retryBreathPhase();
    }, { once: true });
  },

  breathSucceed() {
    if (this._breathEnded) return;
    this._breathEnded = true;
    this.cleanupBreath();
    State.breathSuccess = true;
    State.correctChoices++;
    Audio.successTone();

    document.getElementById('breath-ui').style.display = 'none';
    document.getElementById('vignette').style.background =
      'radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.8) 100%)';

    Dialogue.show([
      { speaker: '', text: '……它走了。', speed: 80 },
      { speaker: '', text: '顾全不知道自己屏住了多久。手脚都在发抖。', speed: 50 },
      { speaker: '', text: '但还活着。', speed: 80 },
      { speaker: '', text: '（还活着。）', speed: 80 },
    ], () => {
      this.chapterEnd();
    });
  },

  chapterEnd() {
    Effects.fadeToBlack(1000).then(() => {
      document.getElementById('breath-ui').style.display = 'none';
      this.showEndScreen();
      Effects.fadeFromBlack(1500);
    });
  },

  showEndScreen() {
    const endScreen = document.getElementById('end-screen');
    endScreen.style.display = 'flex';
    document.getElementById('end-text').textContent = '他明白了一件事——\n\n这个地方有规则。\n规则压着他，也保护他。\n\n但知道规则，并不代表能活下去。';
    document.getElementById('end-text').style.whiteSpace = 'pre-line';

    const stats = document.getElementById('end-stats');
    stats.innerHTML = `
      <div class="end-stat"><span>正确判断</span><span>${State.correctChoices} 次</span></div>
      <div class="end-stat"><span>屏息自救</span><span>${State.breathSuccess ? '成功' : '——'}</span></div>
      <div class="end-stat"><span>手记条目</span><span>${document.querySelectorAll('.notebook-rule,.notebook-observation').length} 条</span></div>
    `;
  },

  cleanupBreath() {
    clearInterval(this.breathInterval);
    clearInterval(this.breathHoldInterval);
    this.breathInterval = null;
    this.breathHoldInterval = null;
    this._breathHolding = false;

    const btn = document.getElementById('breath-hold-btn');
    const center = document.getElementById('breath-center');
    if (btn && this._breathPtrDown) {
      btn.removeEventListener('mousedown', this._breathPtrDown);
      btn.removeEventListener('touchstart', this._breathPtrDown);
      btn.removeEventListener('mouseup', this._breathPtrUp);
      btn.removeEventListener('mouseleave', this._breathPtrUp);
      btn.removeEventListener('touchend', this._breathPtrUp);
      btn.removeEventListener('touchcancel', this._breathPtrUp);
    }
    this._breathPtrDown = null;
    this._breathPtrUp = null;
    if (center) center.classList.remove('stable');
    if (btn) btn.classList.remove('held');

    if (this.breathKeyHandler) {
      document.removeEventListener('keydown', this.breathKeyHandler);
      document.removeEventListener('keyup', this.breathKeyHandler);
      this.breathKeyHandler = null;
    }
    const bu = document.getElementById('breath-ui');
    if (bu) bu.style.zIndex = '';
  },

  exit() {
    this._clearPhase2AutoTimer();
    this.cleanupBreath();
    Rain.stop();
    document.getElementById('vignette').style.background = '';
  }
};

// ============================================================
// INIT
// ============================================================
function init() {
  Dialogue.addClickListener();
  Smell.attachEvents();
  Notebook.init();
  Rain.init();
  document.getElementById('hud').style.display = 'none';
  SceneLens.hide();
  document.getElementById('scene-bg').className = 'bg-img bg-phone-intro';
  // 同步真实时间到规则手机状态栏
  const updatePhoneTime = () => {
    const el = document.getElementById('rms-time');
    if (!el) return;
    const d = new Date();
    el.textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  };
  updatePhoneTime();
  setInterval(updatePhoneTime, 30000);
  Scenes.title.enter();
}

async function restartToBeginning() {
  const overlay = document.createElement('div');
  overlay.style.position = 'fixed';
  overlay.style.inset = '0';
  overlay.style.zIndex = '999999';
  overlay.style.background = 'url("images/it smell you.webp") center/contain no-repeat';
  overlay.style.backgroundColor = '#000';
  overlay.style.opacity = '0';
  overlay.style.transition = 'opacity 0.05s ease-out';
  overlay.style.pointerEvents = 'none';
  document.body.appendChild(overlay);

  overlay.offsetHeight;
  overlay.style.opacity = '1';

  try { Audio.alert(); } catch(e) {}
  try { Audio.heartbeat(2); } catch(e) {}

  await new Promise(r => setTimeout(r, 1200));

  const failScreen = document.getElementById('fail-screen');
  if (failScreen) failScreen.style.display = 'none';
  const endScreen = document.getElementById('end-screen');
  if (endScreen) endScreen.style.display = 'none';

  resetGameProgress();
  State.isRestart = true;
  Notebook.reset();
  SceneManager.showHud(false);
  SceneManager.go('title', null, { skipTransition: true });

  overlay.style.transition = 'opacity 3.5s ease-in-out';
  overlay.style.opacity = '0';

  await new Promise(r => setTimeout(r, 3600));
  overlay.remove();
}

// Start when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
